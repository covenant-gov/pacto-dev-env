services:
  # Nostr relay for local DM / MLS testing
  nostr-relay:
    image: ghcr.io/covenant-gov/pacto-dev-env/nostr-relay:main
    ports:
      - "127.0.0.1:7000:8080"
    volumes:
      - ./relay-config.toml:/usr/src/app/config.toml:ro
      - ./data/relay:/usr/src/app/db
    networks:
      - pacto
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          perl -MIO::Socket::INET -e 'my $$s = IO::Socket::INET->new(PeerAddr=>"localhost:8080", Timeout=>5); exit($$s ? 0 : 1)'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # TLS-terminating sidecar for the Nostr relay. It exposes wss:// on host
  # port 7001 and proxies plain ws:// to the relay container. By default it
  # uses a Caddy-generated self-signed certificate; clients must either skip
  # verification or run scripts/generate-local-certs.sh to switch to a
  # locally-trusted mkcert certificate.
  caddy:
    image: caddy:2-alpine
    container_name: pacto-caddy
    ports:
      - "127.0.0.1:7001:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    networks:
      - pacto
    depends_on:
      nostr-relay:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Pacto bot API daemon. Generate `pacto-bot-api.toml` with
  # `pacto-bot-admin` first; see `pacto-bot-api.toml.example`.
  pacto-bot-api:
    build:
      context: ../pacto-bot-api
      dockerfile: Dockerfile
    image: ghcr.io/covenant-gov/pacto-bot-api:main
    pull_policy: if_not_present
    environment:
      PACTO_DATA_DIR: /var/lib/pacto-bot-api
      PACTO_RELAY_URL: ws://nostr-relay:8080
      PACTO_BOT_NPUB: ${PACTO_BOT_NPUB:-}
      PACTO_BOT_NSEC: ${PACTO_BOT_NSEC:-}
    command:
      - pacto-bot-api
      - --config
      - /etc/pacto/pacto-bot-api.toml
      - --data-dir
      - /var/lib/pacto-bot-api
      - --enable-http
    volumes:
      - pacto-bot-api-data:/var/lib/pacto-bot-api
      - ./pacto-bot-api.toml:/etc/pacto/pacto-bot-api.toml:ro
      - ./data/deployments:/data/deployments
    networks:
      - pacto
    depends_on:
      nostr-relay:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -S /var/lib/pacto-bot-api/pacto-bot-api.sock -o -S /var/lib/pacto-bot-api/.local/share/pacto-bot-api/pacto-bot-api.sock"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure

  # One-shot governance contract seeder for local Anvil. Mounts the sibling
  # pacto-gov repository and writes deployment artifacts to a host directory so
  # other services can read the deployed addresses.
  seed:
    image: pacto-anvil:local
    profiles:
      - seed
      - full
    depends_on:
      anvil:
        condition: service_healthy
    environment:
      PACTO_GOV_DIR: /pacto-gov
      ANVIL_RPC_URL: http://anvil:8545
      ANVIL_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      FORCE_SEED: "${FORCE_SEED:-0}"
      FOUNDRY_OUT: /tmp/pacto-gov-out
      FOUNDRY_CACHE_PATH: /tmp/pacto-gov-cache
      FOUNDRY_BROADCAST: /tmp/pacto-gov-broadcast
      PACTO_BYTECODE_DIR: /bytecode
    volumes:
      - ${PACTO_GOV_DIR:-../pacto-gov}:/pacto-gov
      - ./data/deployments:/pacto-gov/deployments
      - ./data/cache:/tmp/pacto-gov-cache
      - ./data/out:/tmp/pacto-gov-out
      - ./scripts/seed-anvil.sh:/usr/local/bin/seed-anvil.sh:ro
      - ./scripts/ensure-external-contracts.sh:/usr/local/bin/ensure-external-contracts.sh:ro
      - ./scripts/bytecode:/bytecode:ro
    working_dir: /pacto-gov
    command:
      - /usr/local/bin/seed-anvil.sh
    entrypoint:
      - /bin/bash
    networks:
      - pacto
    restart: "no"

  # Local EVM testnet for pacto-gov / sponsor / security-manager contracts.
  # Anvil is built locally because the GHCR image is not yet available; the
  # other services use published images. See the Makefile for convenience targets.
  anvil:
    build:
      context: ./docker
      dockerfile: anvil.Dockerfile
    image: pacto-anvil:local
    command:
      - "--block-time"
      - "2"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8545"
    ports:
      - "127.0.0.1:8545:8545"
    networks:
      - pacto
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Aztec local network. Opt-in via `--profile aztec` or `--profile full`:
  # it needs ~8 GB RAM and an L1 RPC URL.
  aztec-sandbox:
    image: ghcr.io/covenant-gov/pacto-dev-env/aztec-sandbox:main
    profiles:
      - aztec
      - full
    command:
      - "start"
      - "--local-network"
      - "--port"
      - "8080"
      - "--admin-port"
      - "8880"
      - "--data-directory"
      - "/var/lib/aztec"
      - "--l1-rpc-urls"
      - "http://anvil:8545"
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8880:8880"
    volumes:
      - ./data/aztec:/var/lib/aztec
    networks:
      - pacto
    depends_on:
      anvil:
        condition: service_healthy
    restart: on-failure:5
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/status"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  # NIP-46 bunker (Bunker46 server only). Opt-in via `--profile bunker` or
  # `--profile full`: generate real secrets in `.env` first.
  nip46-bunker:
    image: ghcr.io/covenant-gov/pacto-dev-env/nip46-bunker:main
    profiles:
      - bunker
      - full
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://bunker46:bunker46@nip46-bunker-db:5432/bunker46
      JWT_SECRET: ${JWT_SECRET:-changeme-jwt-secret-must-be-at-least-32-characters-long}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme-refresh-secret-must-be-at-least-32-characters-long}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-changeme-encryption-key-must-be-at-least-32-characters-long}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      REDIS_URL: redis://nip46-bunker-redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      NOSTR_DEFAULT_RELAYS: ${NOSTR_DEFAULT_RELAYS:-}
    networks:
      - pacto
    depends_on:
      nip46-bunker-db:
        condition: service_healthy
      nip46-bunker-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/auth/config',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  nip46-bunker-db:
    image: postgres:17-alpine
    profiles:
      - bunker
      - full
    environment:
      POSTGRES_USER: bunker46
      POSTGRES_PASSWORD: bunker46
      POSTGRES_DB: bunker46
    volumes:
      - ./data/nip46-bunker-db:/var/lib/postgresql/data
    networks:
      - pacto
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bunker46"]
      interval: 5s
      timeout: 5s
      retries: 5

  nip46-bunker-redis:
    image: redis:8-alpine
    profiles:
      - bunker
      - full
    networks:
      - pacto
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional debugging sidecar. Attach with:
  #   docker compose --profile debug up -d --build
  #   docker compose exec debug bash
  debug:
    build:
      context: ./docker
      dockerfile: debug.Dockerfile
    image: pacto-debug:local
    profiles:
      - debug
    networks:
      - pacto
    stdin_open: true
    tty: true

networks:
  pacto:
    name: pacto
    driver: bridge

volumes:
  pacto-bot-api-data:
    name: pacto-bot-api-data
  caddy-data:
