name: Validate setup scripts

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-ubuntu-setup:
    name: Ubuntu ${{ matrix.ubuntu }} setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ['24.04', '26.04']

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Build test image
        run: |
          docker build \
            -f "test/ubuntu-${{ matrix.ubuntu }}.Dockerfile" \
            -t "pacto-ubuntu-${{ matrix.ubuntu }}-test:latest" .

      - name: Run setup script
        run: |
          docker run --rm \
            -e PACTO_CLONE_REPOS=skip \
            -e PACTO_SKIP_AZTEC_CLI=1 \
            "pacto-ubuntu-${{ matrix.ubuntu }}-test:latest"

      - name: Verify services compose
        run: |
          docker compose config > /dev/null

  test-debug-image:
    name: Build debug sidecar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Build debug image
        run: |
          docker buildx create --use --name ci-multi-platform-builder || docker buildx use ci-multi-platform-builder
          docker buildx inspect --bootstrap
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file ./docker/debug.Dockerfile \
            --tag pacto-debug:ci-test \
            ./docker

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # v2.0.0
        with:
          severity: warning
          scandir: './'
        env:
          SHELLCHECK_OPTS: '-e SC1091 -e SC2002'
